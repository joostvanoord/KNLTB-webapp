<!doctype html><html lang=nl><meta name=viewport content="width=device-width,initial-scale=1"><title>KNLTB</title><style>:root{font-family:Inter,system-ui,sans-serif;color:#18201a;background:#f7f4ee}body{margin:0}.wrap{max-width:860px;margin:auto;padding:20px}.top{display:flex;justify-content:space-between;align-items:center;gap:12px}.name{font-size:30px;font-weight:800}.bond{color:#667066}.btn{border:0;background:#174f3f;color:white;border-radius:8px;padding:11px 14px;font-weight:700}.grid{display:grid;gap:12px;margin-top:18px}.card{background:white;border:1px solid #e3ded2;border-radius:8px;padding:16px;box-shadow:0 1px 0 #0000000a}.ratings{grid-template-columns:1fr 1fr}.label{color:#667066;font-size:13px}.big{font-size:28px;font-weight:850;margin-top:4px}.ico{font-size:24px}.row{display:flex;justify-content:space-between;gap:12px;align-items:center}.dots{display:flex;gap:7px}.dot{width:22px;height:22px;border-radius:99px;display:grid;place-items:center;color:white;font-size:12px;font-weight:800}.W{background:#1f9d55}.V{background:#c94c43}.match{font-size:20px;font-weight:800}.muted{color:#667066}.teams{display:grid;gap:10px;margin-top:12px}.team{display:flex;justify-content:space-between;align-items:center;background:#f7f4ee;border-radius:8px;padding:12px}@media(max-width:620px){.ratings{grid-template-columns:1fr}.name{font-size:24px}}</style><body><main class=wrap><div class=top><div><div id=name class=name>KNLTB</div><div id=bond class=bond></div></div><button id=refresh class=btn>Ververs</button></div><section class="grid ratings"><div class=card><div class=row><div><div class=label>Single rating</div><div id=single class=big>-</div></div><div class=ico>🎾</div></div></div><div class=card><div class=row><div><div class=label>Dubbel rating</div><div id=double class=big>-</div></div><div class=ico>🎾🎾</div></div></div></section><section class=grid><div class=card><div class=row><div><div class=label>Winst-verlies</div><div id=career class=big>-</div></div><div><div class=label>Dit jaar</div><div id=year class=big>-</div></div></div><div class=label style=margin-top:14px>Historie</div><div id=hist class=dots></div></div><div class=card><div class=label>Volgende wedstrijd</div><div id=match class=match>-</div><div id=meta class=muted></div><div class=teams><div class=team><span id=home></span><span id=homef class=dots></span></div><div class=team><span id=away></span><span id=awayf class=dots></span></div></div></div></section></main><script>let $=x=>document.getElementById(x),dots=s=>[...s].map(x=>`<span class="dot ${x}">${x}</span>`).join("");async function load(){refresh.textContent="Laden...";let r=await fetch("/api/data"),j=await r.json();refresh.textContent="Ververs";if(!j.ok){name.textContent=j.error;return}let d=j.data;name.textContent=d.name||"Onbekend";bond.textContent=d.bond?`Bondsnummer ${d.bond}`:"";single.textContent=d.ratings.single||"-";double.textContent=d.ratings.double||"-";career.textContent=d.record.career||"-";year.textContent=d.record.year||"-";hist.innerHTML=dots(d.record.hist);match.textContent=d.next.date||"-";meta.textContent=[d.next.comp,d.next.klasse].filter(Boolean).join(" · ");home.textContent=d.next.home;away.textContent=d.next.away;homef.innerHTML=dots(d.next.forms[0]||"");awayf.innerHTML=dots(d.next.forms[1]||"")}refresh.onclick=load;load()</script></html>
